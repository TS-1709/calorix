name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Upload coverage
        if: matrix.node == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  size:
    name: Bundle size
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Check sizes
        run: |
          JS=$(stat -c%s dist/assets/index-*.js | head -1)
          CSS=$(stat -c%s dist/assets/index-*.css | head -1)
          JS_GZ=$(gzip -c dist/assets/index-*.js | wc -c)
          CSS_GZ=$(gzip -c dist/assets/index-*.css | wc -c)
          echo "JS:  ${JS} bytes (${JS_GZ} gzipped)"
          echo "CSS: ${CSS} bytes (${CSS_GZ} gzipped)"
          # Fail if any single file exceeds the budget
          test "${JS_GZ}" -lt 102400 || (echo "JS exceeds 100KB gzipped budget"; exit 1)
          test "${CSS_GZ}" -lt 5120 || (echo "CSS exceeds 5KB gzipped budget"; exit 1)
